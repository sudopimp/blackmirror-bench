name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate corpus
        run: python scripts/validate_corpus.py --all
      - name: Safety scan
        run: python scripts/safety_scan.py
      - name: Pytest
        run: pytest -q
      - name: Mock harness
        run: python -m harness.runner --model mock --split public_dev --limit 20 --out results/ci_mock.json
      - name: HF dry-run
        run: python scripts/export_hf.py --dry-run
