<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-label="How to read BlackMirror-Bench">
  <defs>
    <linearGradient id="bg-ht" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0%" stop-color="#0C1222"/>
      <stop offset="55%" stop-color="#080C16"/>
      <stop offset="100%" stop-color="#05070E"/>
    </linearGradient>
    <radialGradient id="glowL-ht" cx="12%" cy="0%" r="55%">
      <stop offset="0%" stop-color="rgba(125,211,252,0.14)"/>
      <stop offset="100%" stop-color="rgba(125,211,252,0)"/>
    </radialGradient>
    <radialGradient id="glowR-ht" cx="92%" cy="8%" r="45%">
      <stop offset="0%" stop-color="rgba(167,139,250,0.12)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0)"/>
    </radialGradient>
    <linearGradient id="bar-teal-ht" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#14B8A6"/><stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="bar-violet-ht" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="card-shine-ht" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="soft-ht" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-sm-ht" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg-ht)" rx="28"/>
  <rect width="100%" height="100%" fill="url(#glowL-ht)" rx="28"/>
  <rect width="100%" height="100%" fill="url(#glowR-ht)" rx="28"/>
  <rect x="1" y="1" width="1198" height="1.5" fill="rgba(255,255,255,0.06)" rx="1"/>
  <text x="48" y="48" fill="#F1F5F9" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="32" font-weight="800" text-anchor="start">How to read this bench</text>
  <text x="48" y="82" fill="#7DD3FC" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" text-anchor="start">Two layers: episode reality first, then the AI report card.</text>
  <rect x="48" y="118" width="1104" height="60" rx="16" fill="#0F1524" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="82" cy="148" r="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="82" y="154" fill="#7DD3FC" font-family="ui-monospace, SF Mono, Cascadia Code, Menlo, Consolas, monospace" font-size="15" font-weight="800" text-anchor="middle">1</text>
  <text x="116" y="154" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">Layer A: how close each Black Mirror thesis is to 2026 reality.</text>
  <rect x="48" y="190" width="1104" height="60" rx="16" fill="#0F1524" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="82" cy="220" r="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="82" y="226" fill="#7DD3FC" font-family="ui-monospace, SF Mono, Cascadia Code, Menlo, Consolas, monospace" font-size="15" font-weight="800" text-anchor="middle">2</text>
  <text x="116" y="226" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">Layer B: every model answers the same 25 questions about those cases.</text>
  <rect x="48" y="262" width="1104" height="60" rx="16" fill="#0F1524" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="82" cy="292" r="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="82" y="298" fill="#7DD3FC" font-family="ui-monospace, SF Mono, Cascadia Code, Menlo, Consolas, monospace" font-size="15" font-weight="800" text-anchor="middle">3</text>
  <text x="116" y="298" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">We grade models against fixed gold feasibility scores (research draft).</text>
  <rect x="48" y="334" width="1104" height="60" rx="16" fill="#0F1524" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="82" cy="364" r="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="82" y="370" fill="#7DD3FC" font-family="ui-monospace, SF Mono, Cascadia Code, Menlo, Consolas, monospace" font-size="15" font-weight="800" text-anchor="middle">4</text>
  <text x="116" y="370" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">BM-Score (0→1) is the overall grade — higher = more honest calibration.</text>
  <rect x="48" y="406" width="1104" height="60" rx="16" fill="#0F1524" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="82" cy="436" r="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="82" y="442" fill="#7DD3FC" font-family="ui-monospace, SF Mono, Cascadia Code, Menlo, Consolas, monospace" font-size="15" font-weight="800" text-anchor="middle">5</text>
  <text x="116" y="442" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">Not a horror contest: “more dystopia” does not earn points.</text>
  <rect x="48" y="478" width="1104" height="60" rx="16" fill="#0F1524" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
  <circle cx="82" cy="508" r="18" fill="rgba(125,211,252,0.12)" stroke="#7DD3FC" stroke-width="1.5"/>
  <text x="82" y="514" fill="#7DD3FC" font-family="ui-monospace, SF Mono, Cascadia Code, Menlo, Consolas, monospace" font-size="15" font-weight="800" text-anchor="middle">6</text>
  <text x="116" y="514" fill="#E2E8F0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="500" text-anchor="start">Want in? PR your primary public_test summary — same rules for everyone.</text>
  <text x="48" y="596" fill="#64748B" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="12" font-weight="500" text-anchor="start">github.com/sudopimp/blackmirror-bench  ·  not affiliated with Netflix / Channel 4 / Charlie Brooker</text>
</svg>
